name: Build Radiance

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Radiance
        uses: actions/checkout@v4

      - name: Checkout MCVR
        uses: actions/checkout@v4
        with:
          repository: Minecraft-Radiance/MCVR
          submodules: recursive
          path: MCVR

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Vulkan SDK
        uses: humblehacker/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.3.268.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Compile Java (Generate JNI headers)
        run: ./gradlew compileJava

      - name: Build MCVR (Windows)
        if: runner.os == 'Windows'
        working-directory: MCVR
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DJAVA_PROJECT_ROOT_DIR="${{ github.workspace }}" -DMCVR_ENABLE_NRD=ON -DUSE_AMD=ON
          cmake --build build -j --config Release
          cmake --install build --config Release

      - name: Build MCVR (Linux)
        if: runner.os == 'Linux'
        working-directory: MCVR
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_PROJECT_ROOT_DIR="${{ github.workspace }}" -DUSE_AMD=ON -DMCVR_ENABLE_NRD=ON
          cmake --build build -j
          cmake --install build

      - name: Build Radiance Mod
        run: ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Radiance-Mod-${{ matrix.os }}
          path: build/libs/
